services:
  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    depends_on:
      - qdrant
    env_file:
      - ../.env
    environment:
      - QDRANT_URL=http://qdrant:6333
    volumes:
      - uploads_data:/app/uploads

volumes:
  qdrant_data:
  uploads_data:
